# ─────────── Маппинг сфер пользователя → отрасли клиентов ───────────
# Какие тестовые компании предлагать, в зависимости от того, что продаёт пользователь.
# Если сфера не найдена — отдай весь список + universal микс.

industry_match:
  # Пользователь продаёт B2B SaaS / AI-инструменты для продаж
  saas_b2b:
    relevant: [retail, fmcg, banking, telecom, logistics, saas]
    rationale: "У средних B2B-компаний обычно есть SDR/sales команды, в которые продаёт B2B SaaS."

  # BI / аналитика / data-консалтинг
  bi_analytics:
    relevant: [retail, banking, fintech, telecom, logistics]
    rationale: "BI нужен там где много операционных данных и слабая видимость воронки."

  # CRM-интеграция, customer ops
  crm:
    relevant: [retail, fmcg, banking, telecom, saas]
    rationale: "CRM-проекты заходят там где есть множество клиентов и менеджеров."

  # Маркетинг / digital-агентство
  marketing_agency:
    relevant: [retail, fmcg, fintech, saas, aviation]
    rationale: "Маркетингу нужны бренды с продуктом для конечного потребителя."

  # Кибербезопасность / IT-инфраструктура
  cybersec:
    relevant: [banking, fintech, telecom, energy, mining, retail]
    rationale: "Регулятор + критичность данных = высокий бюджет на cyber."

  # HR-tech, e-learning, обучение для бизнеса
  hr_tech:
    relevant: [retail, banking, telecom, construction, mining]
    rationale: "Большие команды (100+ людей) — primary buyer для L&D и HR-tech."

  # Любая другая B2B-сфера
  other:
    relevant: [retail, fmcg, banking, telecom, logistics, saas, construction, aviation]
    rationale: "Универсальный микс — узнаваемые KZ B2B-компании разных размеров."
